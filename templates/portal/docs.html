<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScamGuard — API Documentation</title>
  <meta name="description" content="ScamGuard API documentation. Integrate scam and fraud detection into your applications." />
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' },
            surface: { 800: '#1a1d23', 900: '#111318', 950: '#0b0d11' },
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }

    /* Dark theme overrides for Swagger UI */
    .swagger-ui { background: transparent !important; }
    .swagger-ui .topbar { display: none !important; }
    .swagger-ui .info { margin: 20px 0 !important; }
    .swagger-ui .info .title { color: #f1f5f9 !important; font-family: 'Inter', sans-serif !important; font-size: 2rem !important; }
    .swagger-ui .info .description p { color: #94a3b8 !important; }
    .swagger-ui .info .description h2 { color: #e2e8f0 !important; font-size: 1.1rem !important; margin-top: 1.5rem !important; }
    .swagger-ui .info .description table { border-collapse: collapse; }
    .swagger-ui .info .description table th,
    .swagger-ui .info .description table td { border: 1px solid #334155; padding: 6px 12px; color: #cbd5e1; }
    .swagger-ui .info .description table th { background: #1e293b; color: #e2e8f0; }
    .swagger-ui .info .description table code { color: #38bdf8; background: #1e293b; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; }
    .swagger-ui .scheme-container { background: #1a1d23 !important; border-bottom: 1px solid #1e293b !important; box-shadow: none !important; }
    .swagger-ui .opblock-tag { color: #e2e8f0 !important; border-bottom: 1px solid #1e293b !important; }
    .swagger-ui .opblock-tag:hover { background: #1e293b !important; }
    .swagger-ui .opblock { border: 1px solid #1e293b !important; background: #111318 !important; border-radius: 8px !important; margin-bottom: 12px !important; }
    .swagger-ui .opblock .opblock-summary { border: none !important; }
    .swagger-ui .opblock .opblock-summary-method { border-radius: 6px !important; font-weight: 600 !important; min-width: 70px !important; }
    .swagger-ui .opblock .opblock-summary-path { color: #e2e8f0 !important; }
    .swagger-ui .opblock .opblock-summary-description { color: #94a3b8 !important; }
    .swagger-ui .opblock.opblock-post { border-color: #166534 !important; }
    .swagger-ui .opblock.opblock-post .opblock-summary { background: rgba(22, 101, 52, 0.15) !important; }
    .swagger-ui .opblock.opblock-get { border-color: #1e40af !important; }
    .swagger-ui .opblock.opblock-get .opblock-summary { background: rgba(30, 64, 175, 0.15) !important; }
    .swagger-ui .opblock-body { background: #1a1d23 !important; }
    .swagger-ui .opblock-section-header { background: #111318 !important; border-bottom: 1px solid #1e293b !important; }
    .swagger-ui .opblock-section-header h4 { color: #e2e8f0 !important; }
    .swagger-ui table thead tr th { color: #94a3b8 !important; border-bottom: 1px solid #1e293b !important; }
    .swagger-ui table tbody tr td { color: #cbd5e1 !important; border-bottom: 1px solid #1e293b !important; }
    .swagger-ui .parameter__name { color: #e2e8f0 !important; }
    .swagger-ui .parameter__type { color: #94a3b8 !important; }
    .swagger-ui .parameter__in { color: #64748b !important; }
    .swagger-ui .model-box { background: #111318 !important; }
    .swagger-ui .model { color: #e2e8f0 !important; }
    .swagger-ui .model-title { color: #e2e8f0 !important; }
    .swagger-ui .model .property { color: #94a3b8 !important; }
    .swagger-ui .models { border: 1px solid #1e293b !important; border-radius: 8px !important; }
    .swagger-ui .models h4 { color: #e2e8f0 !important; border-bottom: 1px solid #1e293b !important; }
    .swagger-ui .model-container { background: #111318 !important; border-bottom: 1px solid #1e293b !important; }
    .swagger-ui section.models .model-container { background: #111318 !important; }
    .swagger-ui .highlight-code { background: #0b0d11 !important; }
    .swagger-ui .highlight-code .microlight { color: #e2e8f0 !important; background: #0b0d11 !important; }
    .swagger-ui .example__section-header { background: #1a1d23 !important; }
    .swagger-ui .example__section-header h5 { color: #94a3b8 !important; }
    .swagger-ui .btn { border-radius: 6px !important; }
    .swagger-ui .btn.execute { background: #0ea5e9 !important; border-color: #0ea5e9 !important; color: #fff !important; }
    .swagger-ui .btn.execute:hover { background: #0284c7 !important; }
    .swagger-ui .btn.cancel { border-color: #ef4444 !important; color: #ef4444 !important; }
    .swagger-ui textarea { background: #0b0d11 !important; color: #e2e8f0 !important; border: 1px solid #334155 !important; border-radius: 6px !important; }
    .swagger-ui input[type=text] { background: #0b0d11 !important; color: #e2e8f0 !important; border: 1px solid #334155 !important; border-radius: 6px !important; }
    .swagger-ui select { background: #0b0d11 !important; color: #e2e8f0 !important; border: 1px solid #334155 !important; border-radius: 6px !important; }
    .swagger-ui .responses-inner { background: #111318 !important; }
    .swagger-ui .response-col_status { color: #e2e8f0 !important; }
    .swagger-ui .response-col_description { color: #94a3b8 !important; }
    .swagger-ui .response-col_links { color: #94a3b8 !important; }
    .swagger-ui .tab li { color: #94a3b8 !important; }
    .swagger-ui .tab li.active { color: #e2e8f0 !important; }
    .swagger-ui .copy-to-clipboard { background: #1e293b !important; border: none !important; }
    .swagger-ui .copy-to-clipboard button { background: transparent !important; }
    .swagger-ui .loading-container { padding: 40px; }
    .swagger-ui .loading-container .loading { color: #94a3b8; }
    .swagger-ui .arrow { fill: #94a3b8 !important; }
    .swagger-ui svg.arrow { fill: #94a3b8 !important; }
    .swagger-ui .renderedMarkdown p { color: #94a3b8 !important; }
    .swagger-ui .renderedMarkdown code { color: #38bdf8 !important; background: #1e293b !important; padding: 2px 6px !important; border-radius: 4px !important; }
    .swagger-ui .prop-type { color: #38bdf8 !important; }
    .swagger-ui .prop-format { color: #64748b !important; }
    .swagger-ui .json-schema-2020-12 .json-schema-2020-12__attribute { color: #94a3b8 !important; }
  </style>
</head>
<body class="bg-surface-950 text-gray-300 min-h-screen flex flex-col">
  <!-- Header -->
  <header class="border-b border-white/5 bg-surface-900/80 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto flex items-center justify-between px-6 py-3">
      <a href="/" class="flex items-center gap-2">
        <svg class="w-6 h-6 text-brand-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" />
        </svg>
        <span class="text-white font-semibold text-lg tracking-tight">ScamGuard</span>
      </a>
      <nav class="flex items-center gap-6 text-sm text-gray-400">
        <a href="/" class="hover:text-white transition-colors">Scan</a>
        <a href="/docs" class="text-brand-400 font-medium">API</a>
      </nav>
    </div>
  </header>

  <!-- Swagger UI -->
  <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-6">
    <div id="swagger-ui"></div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-white/5 py-6 text-center text-xs text-gray-500">
    ScamGuard API v1.0 &mdash; No authentication required
  </footer>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    SwaggerUIBundle({
      url: '/static/openapi.json',
      dom_id: '#swagger-ui',
      deepLinking: true,
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIBundle.SwaggerUIStandalonePreset,
      ],
      layout: 'BaseLayout',
      defaultModelsExpandDepth: 1,
      defaultModelExpandDepth: 2,
      docExpansion: 'list',
      tryItOutEnabled: true,
      requestSnippetsEnabled: true,
    });
  </script>
</body>
</html>
