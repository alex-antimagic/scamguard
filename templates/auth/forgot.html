{% extends "auth/_layout.html" %}
{% block title %}Forgot password — ScamGuard{% endblock %}
{% block content %}
<div class="bg-surface-900 border border-white/5 rounded-2xl p-8">
  <h1 class="text-2xl font-bold text-white mb-1">Reset your password</h1>
  <p class="text-sm text-gray-400 mb-6">Enter your email and we'll send you a reset link.</p>

  <form method="POST" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div>
      <label class="block text-sm font-medium text-gray-300 mb-1.5">Email</label>
      <input type="email" name="email" required autocomplete="email"
        class="w-full bg-surface-800 border border-surface-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-brand-500" />
    </div>

    <button type="submit" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-semibold rounded-xl px-4 py-2.5 transition-colors">
      Send reset link
    </button>
  </form>

  <p class="text-sm text-gray-400 mt-6 text-center">
    Remembered it? <a href="{{ url_for('auth.login') }}" class="text-brand-400 hover:text-brand-300">Sign in</a>
  </p>
</div>
{% endblock %}
