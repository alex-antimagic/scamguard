{% extends "auth/_layout.html" %}
{% block title %}Verify your email — ScamGuard{% endblock %}
{% block content %}
<div class="bg-surface-900 border border-white/5 rounded-2xl p-8">
  <h1 class="text-2xl font-bold text-white mb-1">Check your email</h1>
  <p class="text-sm text-gray-400 mb-6">We sent a 6-digit code to <strong class="text-gray-200">{{ current_user.email }}</strong>. Enter it below to verify your account.</p>

  <form method="POST" action="{{ url_for('auth.verify_prompt') }}" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div>
      <label class="block text-sm font-medium text-gray-300 mb-1.5">Verification code</label>
      <input type="text" name="code" required maxlength="6" pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code"
        class="w-full bg-surface-800 border border-surface-700 rounded-xl px-4 py-2.5 text-white text-center text-2xl tracking-widest font-mono focus:outline-none focus:border-brand-500" />
    </div>

    <button type="submit" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-semibold rounded-xl px-4 py-2.5 transition-colors">
      Verify
    </button>
  </form>

  <form method="POST" action="{{ url_for('auth.resend') }}" class="mt-4 text-center">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <button type="submit" class="text-sm text-brand-400 hover:text-brand-300">
      Didn't get a code? Resend
    </button>
  </form>
</div>
{% endblock %}
