{% extends "auth/_layout.html" %}
{% block title %}Set a new password — ScamGuard{% endblock %}
{% block content %}
<div class="bg-surface-900 border border-white/5 rounded-2xl p-8">
  <h1 class="text-2xl font-bold text-white mb-1">Set a new password</h1>
  <p class="text-sm text-gray-400 mb-6">Choose a strong password you haven't used elsewhere.</p>

  <form method="POST" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div>
      <label class="block text-sm font-medium text-gray-300 mb-1.5">New password</label>
      <input type="password" name="password" required minlength="8" autocomplete="new-password"
        class="w-full bg-surface-800 border border-surface-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-brand-500" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-300 mb-1.5">Confirm password</label>
      <input type="password" name="confirm" required minlength="8" autocomplete="new-password"
        class="w-full bg-surface-800 border border-surface-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-brand-500" />
    </div>

    <button type="submit" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-semibold rounded-xl px-4 py-2.5 transition-colors">
      Set new password
    </button>
  </form>
</div>
{% endblock %}
