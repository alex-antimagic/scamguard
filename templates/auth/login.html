{% extends "auth/_layout.html" %}
{% block title %}Sign in — ScamGuard{% endblock %}
{% block content %}
<div class="bg-surface-900 border border-white/5 rounded-2xl p-8">
  <h1 class="text-2xl font-bold text-white mb-1">Welcome back</h1>
  <p class="text-sm text-gray-400 mb-6">Sign in to your ScamGuard account.</p>

  <form method="POST" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div>
      <label class="block text-sm font-medium text-gray-300 mb-1.5">Email</label>
      <input type="email" name="email" value="{{ email or '' }}" required autocomplete="email"
        class="w-full bg-surface-800 border border-surface-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-brand-500" />
    </div>

    <div>
      <div class="flex items-center justify-between mb-1.5">
        <label class="block text-sm font-medium text-gray-300">Password</label>
        <a href="{{ url_for('auth.forgot_password') }}" class="text-xs text-brand-400 hover:text-brand-300">Forgot?</a>
      </div>
      <input type="password" name="password" required autocomplete="current-password"
        class="w-full bg-surface-800 border border-surface-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-brand-500" />
    </div>

    <button type="submit" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-semibold rounded-xl px-4 py-2.5 transition-colors">
      Sign in
    </button>
  </form>

  <p class="text-sm text-gray-400 mt-6 text-center">
    No account? <a href="{{ url_for('auth.register') }}" class="text-brand-400 hover:text-brand-300">Create one</a>
  </p>
</div>
{% endblock %}
