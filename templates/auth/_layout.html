<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ScamGuard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' },
            surface: { 700: '#1e2128', 800: '#1a1d23', 900: '#111318', 950: '#0b0d11' },
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-surface-950 text-gray-300 min-h-screen flex flex-col">
  <header class="border-b border-white/5 bg-surface-900/80 backdrop-blur-md">
    <div class="max-w-6xl mx-auto flex items-center justify-between px-6 py-3">
      <a href="/" class="flex items-center gap-2">
        <svg class="w-6 h-6 text-brand-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" />
        </svg>
        <span class="text-white font-semibold text-lg tracking-tight">ScamGuard</span>
      </a>
      <nav class="flex items-center gap-6 text-sm text-gray-400">
        <a href="/scan" class="hover:text-white">Scan</a>
        <a href="/api" class="hover:text-white">API</a>
      </nav>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
          <div class="mb-4 px-4 py-3 rounded-lg text-sm
            {% if category == 'error' %}bg-red-900/40 border border-red-700 text-red-200
            {% elif category == 'success' %}bg-green-900/40 border border-green-700 text-green-200
            {% else %}bg-blue-900/40 border border-blue-700 text-blue-200{% endif %}">
            {{ msg }}
          </div>
        {% endfor %}
      {% endwith %}

      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="border-t border-white/5 py-4 text-center text-xs text-gray-500">
    &copy; ScamGuard &middot; <a href="/api" class="hover:text-gray-400">API</a>
  </footer>
</body>
</html>
