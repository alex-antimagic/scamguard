{% extends "app/_layout.html" %}
{% block title %}Settings — ScamGuard{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
  <header class="mb-6">
    <h1 class="text-2xl font-bold text-white">Settings</h1>
    <p class="text-sm text-gray-400 mt-1">Manage your account.</p>
  </header>

  <!-- Profile -->
  <div class="bg-surface-900 border border-white/5 rounded-xl p-6 mb-6">
    <h2 class="text-sm font-semibold text-gray-300 mb-4">Profile</h2>
    <form method="POST" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="action" value="update_profile">

      <div>
        <label class="block text-xs text-gray-500 mb-1.5">Email</label>
        <input type="email" value="{{ current_user.email }}" disabled
          class="w-full bg-surface-800 border border-surface-700 rounded-xl px-4 py-2.5 text-gray-400 cursor-not-allowed" />
      </div>

      <div>
        <label class="block text-xs text-gray-500 mb-1.5">Name</label>
        <input type="text" name="name" value="{{ current_user.name or '' }}"
          class="w-full bg-surface-800 border border-surface-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-brand-500" />
      </div>

      <button type="submit" class="bg-brand-500 hover:bg-brand-600 text-white font-medium text-sm rounded-xl px-5 py-2">
        Save
      </button>
    </form>
  </div>

  <!-- Password -->
  <div class="bg-surface-900 border border-white/5 rounded-xl p-6">
    <h2 class="text-sm font-semibold text-gray-300 mb-4">Change password</h2>
    <form method="POST" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="action" value="change_password">

      <div>
        <label class="block text-xs text-gray-500 mb-1.5">Current password</label>
        <input type="password" name="current_password" required autocomplete="current-password"
          class="w-full bg-surface-800 border border-surface-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-brand-500" />
      </div>

      <div>
        <label class="block text-xs text-gray-500 mb-1.5">New password</label>
        <input type="password" name="new_password" required minlength="8" autocomplete="new-password"
          class="w-full bg-surface-800 border border-surface-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-brand-500" />
      </div>

      <button type="submit" class="bg-brand-500 hover:bg-brand-600 text-white font-medium text-sm rounded-xl px-5 py-2">
        Update password
      </button>
    </form>
  </div>
</div>
{% endblock %}
